services:
  - type: web
    name: zenadam-api
    env: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm run start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_BASE_PATH
        value: /api/v1
      - key: LOG_LEVEL
        value: info
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: zenadam_prod
      - key: AI_API_KEY
        sync: false
      - key: AI_TRANSLATION_MODEL
        sync: false
      - key: AI_SUMMARY_MODEL
        sync: false
      - key: AI_EMBEDDING_MODEL
        sync: false
      - key: QUEUE_BACKEND
        value: mongodb
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_BASIC_AUTH_USER
        sync: false
      - key: ADMIN_BASIC_AUTH_PASS
        sync: false

  - type: worker
    name: zenadam-worker
    env: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: zenadam_prod
      - key: AI_API_KEY
        sync: false
      - key: QUEUE_BACKEND
        value: mongodb

cronJobs:
  - name: zenadam-cron
    env: node
    rootDir: backend
    schedule: '*/15 * * * *'
    buildCommand: npm ci
    startCommand: npm run cron
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: zenadam_prod
      - key: AI_API_KEY
        sync: false
      - key: QUEUE_BACKEND
        value: mongodb
