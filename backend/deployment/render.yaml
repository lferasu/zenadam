services:
  - type: web
    name: zenadam-api
    env: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm run start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: zenadam_prod
      - key: AI_API_KEY
        sync: false
      - key: AI_TRANSLATION_MODEL
        value: <model>
      - key: AI_SUMMARY_MODEL
        value: <model>
      - key: AI_EMBEDDING_MODEL
        value: <model>

  - type: worker
    name: zenadam-worker
    env: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: zenadam_prod
      - key: AI_API_KEY
        sync: false

cronJobs:
  - name: zenadam-cron
    env: node
    rootDir: backend
    schedule: "*/15 * * * *"
    buildCommand: npm ci
    startCommand: npm run cron
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: zenadam_prod
